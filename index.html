<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arcade Expansion Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Link ke file CSS eksternal -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Arcade Expansion Hub</h1>
    <p>Koleksi semua game klasik dalam versi 3D kartunis RTX</p>
  </header>

  <main>
    <section class="grid">
      <!-- Contoh game -->
      <div class="card">
        <img src="assets/icons/snake.png" alt="Google Snake">
        <h3>Google Snake</h3>
        <button onclick="loadGame('games/snake/index.html')">Play</button>
      </div>

      <div class="card">
        <img src="assets/icons/dino.png" alt="Google Dino Runner">
        <h3>Dino Runner</h3>
        <button onclick="loadGame('games/dino/index.html')">Play</button>
      </div>

      <div class="card">
        <img src="assets/icons/pacman.png" alt="Pacman">
        <h3>Pacman</h3>
        <button onclick="loadGame('games/pacman/index.html')">Play</button>
      </div>

      <!-- Tambahkan semua game lain sesuai daftar -->
    </section>

    <section id="game-container">
      <iframe id="game-frame" src=""></iframe>
    </section>
  </main>

  <script>
    function loadGame(url) {
      document.getElementById('game-frame').src = url;
    }
  </script>
</body>
</html>
